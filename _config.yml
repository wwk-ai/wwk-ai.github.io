# ============================================================
# 站点全局配置 _config.yml
# 适配：wesleywwk.github.io | 企业级AI/Java技术博客
# Hexo 7.x + Volantis 6.x/7.x 主题
# ============================================================

# 网站基础信息
title: "Wesley AI Lab"
subtitle: "企业级AI大模型与Java后端技术实战"
description: "聚焦AI大模型落地、Java高并发架构、Spring生态与云原生技术，分享企业级实战方案与源码解析。配套语雀主页：yuque.com/wwk-ai"
keywords: "AI大模型, Java后端, Spring Boot, 技术博客, 企业级架构, 云原生, 深度学习"
author: "Wesley"
language: zh-CN
timezone: Asia/Shanghai

# 网站地址配置
url: https://wwk-ai.github.io
root: /
permalink: posts/:year/:month/:title/  # 年/月/标题格式，美观且利于SEO
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# 目录结构配置
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: lang
skip_render:

# 写作配置
new_post_name: :year:month:day-:title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: false  # Volantis主题接管代码高亮
  line_number: false
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false

# 搜索配置
search:
  path: search.xml
  field: post
  content: true
  format: html

# 首页分页
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# 分类与标签
category_generator:
  per_page: 10
  order_by: -date
tag_generator:
  per_page: 10
  order_by: -date

# 归档
archive_generator:
  per_page: 20
  yearly: true
  monthly: true
  order_by: -date

# 时间日期格式
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# 分页设置
per_page: 10
pagination_dir: page

# 主题配置
# Volantis 6.x 稳定版（通过npm安装）
theme: volantis

# 主题配置覆盖文件（Hexo 5.0+ 支持）
# 优先使用 _config.volantis.yml 覆盖主题默认配置

# 部署配置（方案A：本地一键部署，可选）
deploy:
  type: git
  repo: https://github.com/wwk-ai/wwk-ai.github.io.git
  branch: gh-pages
  message: "deploy: {{ now('YYYY-MM-DD HH:mm:ss') }}"

# Feed 订阅配置
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content:
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date
  icon: icon.png
  autodiscovery: true
  template:

# Sitemap SEO
sitemap:
  path: sitemap.xml
  rel: false
  tags: true
  categories: true

# 自定义样式注入
import:
  head_begin:
    - |
      <style>
        .nav-main a, .nav-main .nav-item, .nav-sub .nav-item {
          white-space: nowrap !important;
        }
        .cover-body .subtitle {
          font-size: 1.25rem;
          font-weight: 500;
          min-height: 1.5em;
        }
        .cover-body .subtitle .typewriter-text {
          background: linear-gradient(90deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #667eea 100%);
          background-size: 300% auto;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          animation: gradient-flow 3s linear infinite;
        }
        @keyframes gradient-flow {
          0% { background-position: 0% center; }
          100% { background-position: 300% center; }
        }
        .typewriter-cursor {
          display: inline-block;
          width: 3px;
          height: 1em;
          background: linear-gradient(180deg, #ff6b6b, #4ecdc4);
          margin-left: 4px;
          animation: blink 0.8s infinite;
          vertical-align: middle;
        }
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0; }
        }
      </style>
    - |
      <script defer>
        document.addEventListener('DOMContentLoaded', function() {
          const subtitleEl = document.querySelector('.cover-body .subtitle');
          if (!subtitleEl) return;
          const text = 'Java全栈技术实战';
          subtitleEl.innerHTML = '<span class="typewriter-text"></span><span class="typewriter-cursor"></span>';
          const textSpan = subtitleEl.querySelector('.typewriter-text');
          let charIndex = 0;
          let isDeleting = false;
          function type() {
            if (isDeleting) {
              textSpan.textContent = text.substring(0, charIndex - 1);
              charIndex--;
            } else {
              textSpan.textContent = text.substring(0, charIndex + 1);
              charIndex++;
            }
            let delay = isDeleting ? 100 : 150;
            if (!isDeleting && charIndex === text.length) {
              isDeleting = true;
              delay = 2000;
            } else if (isDeleting && charIndex === 0) {
              isDeleting = false;
              delay = 500;
            }
            setTimeout(type, delay);
          }
          type();
        });
      </script>

# ============================================================
# 安全与忽略
# ============================================================
ignore:
