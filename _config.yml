# ============================================================
# 站点全局配置 _config.yml
# 适配：wesleywwk.github.io | 企业级AI/Java技术博客
# Hexo 7.x + Volantis 6.x/7.x 主题
# ============================================================

# 网站基础信息
title: "Wesley AI Lab"
subtitle: "企业级AI大模型与Java后端技术实战"
description: "聚焦AI大模型落地、Java高并发架构、Spring生态与云原生技术，分享企业级实战方案与源码解析。配套语雀主页：yuque.com/wwk-ai"
keywords: "AI大模型, Java后端, Spring Boot, 技术博客, 企业级架构, 云原生, 深度学习"
author: "Wesley"
language: zh-CN
timezone: Asia/Shanghai

# 网站地址配置
url: https://wwk-ai.github.io
root: /
permalink: posts/:year/:month/:title/  # 年/月/标题格式，美观且利于SEO
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# 目录结构配置
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: lang
skip_render:
  - "index.html"
  - "about/index.html"
  - "images/*"

# 写作配置
new_post_name: :year:month:day-:title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: false  # Volantis主题接管代码高亮
  line_number: false
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false

# 搜索配置
search:
  path: search.xml
  field: post
  content: true
  format: html

# 首页分页
index_generator:
  path: blog
  per_page: 10
  order_by: -date

# 分类与标签
category_generator:
  per_page: 10
  order_by: -date
tag_generator:
  per_page: 10
  order_by: -date

# 归档（已禁用）
# archive_generator:
#   per_page: 20
#   yearly: true
#   monthly: true
#   order_by: -date

# 时间日期格式
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# 分页设置
per_page: 10
pagination_dir: page

# 主题配置
# Volantis 6.x 稳定版（通过npm安装）
theme: volantis

# 主题配置覆盖文件（Hexo 5.0+ 支持）
# 优先使用 _config.volantis.yml 覆盖主题默认配置

# 部署配置（方案A：本地一键部署，可选）
deploy:
  type: git
  repo: https://github.com/wwk-ai/wwk-ai.github.io.git
  branch: gh-pages
  message: "deploy: {{ now('YYYY-MM-DD HH:mm:ss') }}"

# Feed 订阅配置
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content:
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date
  icon: icon.png
  autodiscovery: true
  template:

# Sitemap SEO
sitemap:
  path: sitemap.xml
  rel: false
  tags: true
  categories: true

# 自定义样式注入
import:
  head_begin:
    - |
      <style>
        .nav-main a, .nav-main .nav-item, .nav-sub .nav-item {
          white-space: nowrap !important;
        }
        .cover-body .subtitle {
          font-size: 1.25rem;
          font-weight: 500;
          min-height: 1.5em;
        }
        .cover-body .subtitle .typewriter-text {
          background: linear-gradient(90deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #667eea 100%);
          background-size: 300% auto;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          animation: gradient-flow 3s linear infinite;
        }
        @keyframes gradient-flow {
          0% { background-position: 0% center; }
          100% { background-position: 300% center; }
        }
        .typewriter-cursor {
          display: inline-block;
          width: 3px;
          height: 1em;
          background: linear-gradient(180deg, #ff6b6b, #4ecdc4);
          margin-left: 4px;
          animation: blink 0.8s infinite;
          vertical-align: middle;
        }
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0; }
        }
      </style>


  body_end:
    - |
      <script>
        // Giscus 评论系统 (Volantis 6.x 无内置giscus支持，手动注入)
        document.addEventListener('DOMContentLoaded', function() {
          // 仅在有 #giscus-container 的页面加载评论
          var container = document.getElementById('giscus-container');
          if (!container) return;

          var theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
          var script = document.createElement('script');
          script.src = 'https://giscus.app/client.js';
          script.setAttribute('data-repo', 'wwk-ai/wwk-ai.github.io');
          script.setAttribute('data-repo-id', 'MDEwOlJlcG9zaXRvcnkyNjY1MzE0MjU=');
          script.setAttribute('data-category', 'Announcements');
          script.setAttribute('data-category-id', 'DIC_kwDOD-LyYc4CQPaP');
          script.setAttribute('data-mapping', 'pathname');
          script.setAttribute('data-strict', '0');
          script.setAttribute('data-reactions-enabled', '1');
          script.setAttribute('data-emit-metadata', '0');
          script.setAttribute('data-input-position', 'top');
          script.setAttribute('data-theme', theme);
          script.setAttribute('data-lang', 'zh-CN');
          script.setAttribute('data-loading', 'lazy');
          script.setAttribute('crossorigin', 'anonymous');
          script.async = true;
          container.appendChild(script);

          // 监听暗黑模式切换
          var observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(m) {
              if (m.attributeName === 'data-theme') {
                var newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
                var iframe = document.querySelector('iframe.giscus-frame');
                if (iframe) {
                  iframe.contentWindow.postMessage({
                    giscus: { setConfig: { theme: newTheme } }
                  }, 'https://giscus.app');
                }
              }
            });
          });
          observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
        });
      </script>
    - |
      <style>
        /* 博客页统一导航 */
        .custom-nav {
          position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
          padding: 0 40px; height: 64px;
          display: flex; align-items: center; justify-content: space-between;
          background: rgba(10, 14, 39, 0.78);
          backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
          border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .custom-nav-brand {
          display: flex; align-items: center; gap: 10px;
          font-weight: 600; font-size: 16px; color: #e2e8f0;
          text-decoration: none;
        }
        .custom-nav-brand-icon {
          width: 32px; height: 32px; border-radius: 8px;
          background: linear-gradient(135deg, #667eea, #f093fb);
          display: flex; align-items: center; justify-content: center;
          color: white; font-size: 14px;
        }
        .custom-nav-links { display: flex; align-items: center; gap: 2px; }
        .custom-nav-link {
          padding: 6px 12px; border-radius: 8px;
          font-size: 13px; font-weight: 500;
          color: #94a3b8; text-decoration: none;
          transition: all 0.2s ease; white-space: nowrap;
        }
        .custom-nav-link:hover { color: #e2e8f0; background: rgba(255,255,255,0.08); }
        .custom-nav-link.source-btn {
          background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
          color: #a5b4fc; margin-left: 6px;
        }
        .custom-nav-link.source-btn:hover { background: rgba(129,140,248,0.15); border-color: rgba(129,140,248,0.3); }
        .custom-nav-mobile-toggle {
          display: none; width: 36px; height: 36px; border-radius: 8px;
          align-items: center; justify-content: center;
          border: 1px solid rgba(255,255,255,0.08); background: transparent;
          color: #94a3b8; font-size: 16px; cursor: pointer;
        }
        .custom-nav-mobile-menu {
          display: none; position: fixed; top: 64px; left: 0; right: 0; bottom: 0;
          background: rgba(10, 14, 39, 0.96); backdrop-filter: blur(20px);
          padding: 20px; z-index: 9998; flex-direction: column; gap: 2px; overflow-y: auto;
        }
        .custom-nav-mobile-menu.open { display: flex; }
        .custom-nav-mobile-menu a {
          display: flex; align-items: center; gap: 12px;
          padding: 14px 16px; border-radius: 12px;
          font-size: 15px; font-weight: 500; color: #94a3b8;
          text-decoration: none; transition: all 0.2s;
        }
        .custom-nav-mobile-menu a:hover { background: rgba(255,255,255,0.06); color: #e2e8f0; }
        .custom-nav-mobile-menu a i { width: 22px; text-align: center; color: #64748b; }
        @media (max-width: 900px) {
          .custom-nav-links { display: none; }
          .custom-nav-mobile-toggle { display: flex; }
          .custom-nav { padding: 0 16px; }
        }
        /* 隐藏 Volantis 原导航和 cover/banner */
        body.custom-nav-active .l_header,
        body.custom-nav-active #l_header,
        body.custom-nav-active .header,
        body.custom-nav-active #header,
        body.custom-nav-active .nav-wrapper {
          display: none !important;
        }
        body.custom-nav-active .cover-wrapper,
        body.custom-nav-active #cover,
        body.custom-nav-active .l_cover,
        body.custom-nav-active .cover,
        body.custom-nav-active .article-header,
        body.custom-nav-active .post-header,
        body.custom-nav-active .page-header {
          display: none !important;
        }
        body.custom-nav-active { padding-top: 64px !important; }
        body.custom-nav-active .l_main { margin-top: 0 !important; padding-top: 20px !important; }
      </style>
      <script>
        (function() {
          // 如果页面已有自定义导航（首页/关于页），不执行
          if (document.querySelector('.nav-brand')) return;
          // 如果页面上没有 Volantis 导航特征，也不执行（安全fallback）
          var volantisNav = document.querySelector('.l_header, #l_header, .header, #header, .nav-wrapper');
          if (!volantisNav) return;

          // 隐藏 Volantis 导航
          volantisNav.style.display = 'none';
          var volantisSubNav = document.querySelector('.l_header-sub, .header-sub, .sub-nav');
          if (volantisSubNav) volantisSubNav.style.display = 'none';
          document.body.classList.add('custom-nav-active');

          // 插入自定义导航
          var navHTML = '<nav class="custom-nav" id="customNav">' +
            '<a href="/" class="custom-nav-brand">' +
              '<div class="custom-nav-brand-icon"><i class="fa-solid fa-microchip"></i></div>' +
              '<span>Wesley AI Lab</span>' +
            '</a>' +
            '<div class="custom-nav-links">' +
              '<a href="/blog/" class="custom-nav-link">博客</a>' +
              '<a href="/ai-column/" class="custom-nav-link">AI 专栏</a>' +
              '<a href="/java-column/" class="custom-nav-link">Java 专栏</a>' +
              '<a href="/projects/" class="custom-nav-link">项目作品</a>' +
              '<a href="/friends/" class="custom-nav-link">友链</a>' +
              '<a href="/about/" class="custom-nav-link">关于</a>' +
              '<a href="/guestbook/" class="custom-nav-link">留言</a>' +
              '<a href="https://github.com/wwk-ai" target="_blank" class="custom-nav-link source-btn"><i class="fa-brands fa-github"></i> 源码</a>' +
            '</div>' +
            '<button class="custom-nav-mobile-toggle" id="customMobileToggle"><i class="fa-solid fa-bars"></i></button>' +
          '</nav>' +
          '<div class="custom-nav-mobile-menu" id="customMobileMenu">' +
            '<a href="/blog/"><i class="fa-solid fa-book-open"></i> 博客</a>' +
            '<a href="/ai-column/"><i class="fa-solid fa-robot"></i> AI 专栏</a>' +
            '<a href="/java-column/"><i class="fa-brands fa-java"></i> Java 专栏</a>' +
            '<a href="/projects/"><i class="fa-solid fa-laptop-code"></i> 项目作品</a>' +
            '<a href="/friends/"><i class="fa-solid fa-link"></i> 友链</a>' +
            '<a href="/about/"><i class="fa-solid fa-user"></i> 关于</a>' +
            '<a href="/guestbook/"><i class="fa-solid fa-comments"></i> 留言</a>' +
            '<a href="https://github.com/wwk-ai" target="_blank"><i class="fa-brands fa-github"></i> 源码</a>' +
          '</div>';

          var temp = document.createElement('div');
          temp.innerHTML = navHTML;
          while (temp.firstChild) {
            document.body.insertBefore(temp.firstChild, document.body.firstChild);
          }

          // Mobile menu toggle
          var toggle = document.getElementById('customMobileToggle');
          var menu = document.getElementById('customMobileMenu');
          if (toggle && menu) {
            toggle.addEventListener('click', function() {
              menu.classList.toggle('open');
              var icon = toggle.querySelector('i');
              icon.className = menu.classList.contains('open') ? 'fa-solid fa-xmark' : 'fa-solid fa-bars';
            });
            menu.querySelectorAll('a').forEach(function(a) {
              a.addEventListener('click', function() {
                menu.classList.remove('open');
                toggle.querySelector('i').className = 'fa-solid fa-bars';
              });
            });
          }
        })();
      </script>

# ============================================================
# 安全与忽略
# ============================================================
ignore:
