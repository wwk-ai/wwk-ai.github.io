name: 申请友链
description: 申请添加友情链接
title: ""
labels: ["友链"]
body:
  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      description: 请认真检查以下清单中的每一项，并在相符的项前打勾。
      options:
        - label: 合法的、无木马植入的站点。
          required: true
        - label: 有实质性原创内容的 HTTPS 站点，发布过至少 5 篇原创文章，内容题材不限。
          required: true
        - label: 有独立域名，非免费域名。
          required: true

  - type: markdown
    attributes:
      value: |
        ### 站点信息
        请在双引号中填写，不要修改格式。

  - type: textarea
    id: site_info
    attributes:
      label: 站点信息（JSON格式）
      description: 请按以下格式填写
      value: |
        ```json
        {
          "title": "",
          "url": "",
          "avatar": "",
          "screenshot": "",
          "description": ""
        }
        ```
      render: json
    validations:
      required: true

  - type: input
    id: preview
    attributes:
      label: 预览页面
      description: 请输入您的网站地址。
      placeholder: 如：https://example.com
    validations:
      required: true
