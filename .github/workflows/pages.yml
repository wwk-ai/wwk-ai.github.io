# ============================================================
# GitHub Actions CI/CD 自动构建部署
# 文件路径: .github/workflows/pages.yml
# 功能: 每次 push 到 main 分支自动构建并部署到 GitHub Pages
# ============================================================

name: Pages

on:
  push:
    branches:
      - main  # 默认分支，若你的默认分支是 master 请修改此处

  # 允许手动触发部署
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出源码（含子模块）
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      # 2. 设置 Node.js 环境
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. 缓存 NPM 依赖，加速构建
      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.OS }}-npm-cache
          restore-keys: |
            ${{ runner.OS }}-npm-cache

      # 4. 安装依赖
      - name: Install Dependencies
        run: npm install

      # 5. 构建静态页面
      - name: Build
        run: npm run build

      # 6. 上传构建产物
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 7. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
